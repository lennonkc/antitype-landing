<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Soft luminous backdrop -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="55%" stop-color="#F2F6FB" />
      <stop offset="100%" stop-color="#E3EAF3" />
    </radialGradient>

    <!-- Frosted lens interior -->
    <radialGradient id="lensGlass" cx="40%" cy="33%" r="82%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.60" />
      <stop offset="58%" stop-color="#EAF1F8" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#C9D6E6" stop-opacity="0.14" />
    </radialGradient>

    <!-- Glass ring body: top-light to bottom-shadow -->
    <linearGradient id="ringGlass" x1="28%" y1="0%" x2="72%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96" />
      <stop offset="45%" stop-color="#DCE6F0" stop-opacity="0.78" />
      <stop offset="100%" stop-color="#AEC0D5" stop-opacity="0.66" />
    </linearGradient>

    <!-- Flowing spectrum wave -->
    <linearGradient id="waveGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#5FD4C4" />
      <stop offset="28%" stop-color="#7FB7E2" />
      <stop offset="54%" stop-color="#A9A8DE" />
      <stop offset="80%" stop-color="#F0C97C" />
      <stop offset="100%" stop-color="#5FD4C4" />
    </linearGradient>

    <!-- Glass pills -->
    <linearGradient id="goldGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBEAB2" />
      <stop offset="100%" stop-color="#E5C36C" />
    </linearGradient>
    <linearGradient id="blueGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C2E1F5" />
      <stop offset="100%" stop-color="#7DB1DE" />
    </linearGradient>

    <!-- Specular sheen -->
    <radialGradient id="specular" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#56678A" flood-opacity="0.22" />
    </filter>
    <filter id="waveGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="auraBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="36" />
    </filter>
    <filter id="blurSmall" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" />
    </filter>

    <clipPath id="frame">
      <rect width="400" height="400" rx="92" />
    </clipPath>
  </defs>

  <rect width="400" height="400" rx="92" fill="url(#bgGlow)" />

  <g clip-path="url(#frame)">
    <!-- Refracted color aura behind the glass -->
    <g filter="url(#auraBlur)" opacity="0.5">
      <circle cx="146" cy="158" r="72" fill="#7BDEC8" />
      <circle cx="212" cy="132" r="56" fill="#B2A8D3" />
      <circle cx="262" cy="252" r="74" fill="#E5C779" />
    </g>

    <!-- Floating glass assembly -->
    <g filter="url(#softShadow)">
      <!-- frosted lens interior -->
      <circle cx="200" cy="200" r="120" fill="url(#lensGlass)" />

      <!-- glass ring body -->
      <circle cx="200" cy="200" r="130" fill="none" stroke="url(#ringGlass)" stroke-width="22" />
      <!-- edge rim lights -->
      <circle cx="200" cy="200" r="141" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.7" />
      <circle cx="200" cy="200" r="119" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.55" />

      <!-- glass pills -->
      <g transform="rotate(-35 200 200)">
        <rect x="178" y="42" width="44" height="22" rx="11" fill="url(#goldGlass)" fill-opacity="0.95" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.7" />
        <rect x="183" y="46" width="34" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.5" />
      </g>
      <g transform="rotate(35 200 200)">
        <rect x="178" y="42" width="44" height="22" rx="11" fill="url(#blueGlass)" fill-opacity="0.95" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.7" />
        <rect x="183" y="46" width="34" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.5" />
      </g>
    </g>

    <!-- specular sheen on the lens -->
    <ellipse cx="156" cy="150" rx="54" ry="32" fill="url(#specular)" opacity="0.55" transform="rotate(-24 156 150)" />
    <!-- specular highlight arc on the ring -->
    <path d="M 78 156 A 130 130 0 0 1 156 78" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85" filter="url(#blurSmall)" />

    <!-- voice wave -->
    <g filter="url(#waveGlow)">
      <path d="M 80 200
               Q 100 170, 120 200
               Q 140 230, 160 200
               Q 180 120, 200 200
               Q 220 280, 240 200
               Q 260 170, 280 200
               Q 300 230, 320 200"
            fill="none" stroke="url(#waveGradient)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
