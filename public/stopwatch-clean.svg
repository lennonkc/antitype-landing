<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bezelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4c" />
      <stop offset="20%" stop-color="#2a2a2c" />
      <stop offset="80%" stop-color="#1a1a1c" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>
    <radialGradient id="screenBase" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#151515" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="glassGlare" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="yellowBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffca28" />
      <stop offset="100%" stop-color="#f57f17" />
    </linearGradient>
    <linearGradient id="blueBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42a5f5" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
  </defs>

  <!-- top-right yellow button (the press target for the demo) -->
  <g id="btn-yellow" transform="rotate(-48 200 200)">
    <rect x="168" y="26" width="64" height="20" rx="6" fill="#c49010" />
    <rect x="168" y="22" width="64" height="16" rx="6" fill="url(#yellowBtn)" />
  </g>

  <g id="btn-blue" transform="rotate(48 200 200)">
    <rect x="168" y="28" width="64" height="18" rx="6" fill="#0d47a1" />
    <rect x="168" y="24" width="64" height="16" rx="6" fill="url(#blueBtn)" />
  </g>

  <circle cx="200" cy="200" r="164" fill="url(#bezelGrad)" />
  <circle cx="200" cy="200" r="154" fill="#0a0a0a" stroke="#222" stroke-width="2" />

  <g id="screen">
    <circle cx="200" cy="200" r="150" fill="url(#screenBase)" />
  </g>

  <path d="M 52 180 A 148 148 0 0 1 348 180 Q 200 260 52 180 Z" fill="url(#glassGlare)" />
  <path d="M 50 200 A 150 150 0 0 1 200 50 A 150 150 0 0 0 50 200 Z" fill="#ffffff" opacity="0.05" />
</svg>
